name: OpenSplat (Ubuntu 24.04 + ROS2 Jazzy)

on:
  push:
    branches:
      - main
  pull_request:
    types: [ assigned, opened, synchronize, reopened ]
  release:
    types: [ published, edited ]

jobs:
  docker-rocm:
    name: ubuntu-24.04-docker-rocm-7.2-gfx1151-${{ matrix.cmake-build-type }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        cmake-build-type: [Release]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          df -hT
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/hostedtoolcache/Python
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /var/lib/gems
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo apt-get autoremove -y
          sudo apt-get autoclean -y
          docker images -qf "dangling=true" | xargs -r sudo docker rmi
          docker system prune -a -f
          echo "Disk usage after cleanup:"
          df -hT
          sudo service docker stop
          sudo mv /var/lib/docker /mnt/docker-data
          sudo ln -s /mnt/docker-data /var/lib/docker
          sudo service docker start

      - name: Build Docker Image (ROCm 7.2 + ROS2 Jazzy + gfx1151)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.rocm7.2
          build-args: |
            ROCM_VERSION=7.2
            TORCH_VERSION=2.10.0
            CMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }}
            PYTORCH_ROCM_ARCH=gfx900;gfx906;gfx908;gfx90a;gfx940;gfx941;gfx942;gfx1030;gfx1100;gfx1101;gfx1102;gfx1151
          push: false
          tags: opensplat:ubuntu24-rocm7.2-ros2-jazzy-gfx1151

  build:
    name: ${{ matrix.os }}-cpu-torch-${{ matrix.torch-version }}-ros2-jazzy-${{ matrix.cmake-build-type }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        torch-version: [2.6.0]
        cmake-build-type: [Release]
    env:
      CCACHE_DIR: ${{ github.workspace }}/ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CMAKE_GENERATOR: Ninja
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libopencv-dev \
            curl \
            gnupg \
            lsb-release \
            wget \
            unzip
          wget -nv https://github.com/ccache/ccache/releases/download/v4.9.1/ccache-4.9.1-linux-x86_64.tar.xz
          sudo tar xf ccache-4.9.1-linux-x86_64.tar.xz -C /usr/bin --strip-components=1 --no-same-owner ccache-4.9.1-linux-x86_64/ccache
          rm -f ccache-*-linux-x86_64.tar.xz
          ccache --version

      - name: Add ROS2 Jazzy repository
        run: |
          curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
               | sudo tee /usr/share/keyrings/ros-archive-keyring.gpg > /dev/null
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
               http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" \
               | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
          sudo apt-get update

      - name: Install ROS2 Jazzy packages
        run: |
          sudo apt-get install -y --no-install-recommends \
            ros-jazzy-ros-base \
            ros-jazzy-rosbag2-cpp \
            ros-jazzy-rosbag2-storage-default-plugins \
            ros-jazzy-sensor-msgs \
            ros-jazzy-geometry-msgs \
            ros-jazzy-cv-bridge

      - name: Restore LibTorch Cache
        uses: actions/cache@v4
        id: libtorch-cache
        with:
          key: libtorch-${{ matrix.torch-version }}-cpu-ubuntu24
          path: ${{ github.workspace }}/libtorch

      - name: Install LibTorch (CPU)
        if: ${{ steps.libtorch-cache.outputs.cache-hit != 'true' }}
        run: |
          wget --no-check-certificate -nv \
            "https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-${{ matrix.torch-version }}%2Bcpu.zip" \
            -O libtorch.zip
          unzip -q libtorch.zip -d ${{ github.workspace }}/
          rm libtorch.zip

      - name: Cache Build
        uses: actions/cache@v4
        id: cache-builds
        with:
          key: ${{ matrix.os }}-cpu-torch-${{ matrix.torch-version }}-jazzy-${{ matrix.cmake-build-type }}-ccache-${{ github.run_id }}
          restore-keys: ${{ matrix.os }}-cpu-torch-${{ matrix.torch-version }}-jazzy-${{ matrix.cmake-build-type }}-ccache-
          path: ${{ env.CCACHE_DIR }}

      - name: Configure and Build
        run: |
          set -x
          source /opt/ros/jazzy/setup.bash
          mkdir build
          cd build
          cmake .. \
            -G"${CMAKE_GENERATOR}" \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} \
            -DCMAKE_C_COMPILER_LAUNCHER=$(which ccache) \
            -DCMAKE_CXX_COMPILER_LAUNCHER=$(which ccache) \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libtorch;/opt/ros/jazzy" \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DOPENSPLAT_BUILD_SIMPLE_TRAINER=ON \
            -DOPENSPLAT_BUILD_ROSBAG=ON
          ninja

      - name: Clean Compiler Cache
        run: |
          set -x
          ccache --show-stats
          ccache --evict-older-than 7d
          ccache --show-stats
